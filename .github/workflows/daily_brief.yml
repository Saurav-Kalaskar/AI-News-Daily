name: Daily AI News Brief

on:
  schedule:
    - cron: '0 9,21 * * *'  # 9 AM and 9 PM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ai_news_user
          POSTGRES_PASSWORD: ai_news_pass
          POSTGRES_DB: ai_news_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run async news bot pipeline
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DATABASE_URL: postgresql+asyncpg://ai_news_user:ai_news_pass@localhost:5432/ai_news_db
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -c "
          import asyncio, sys
          sys.path.insert(0, '.')
          from db.session import get_engine
          from db.models import Base
          async def init_db():
              engine = get_engine()
              async with engine.begin() as conn:
                  await conn.run_sync(Base.metadata.create_all)
              await engine.dispose()
              print('DB schema created')
          asyncio.run(init_db())
          "
          python -m bot.main --run-once
      - name: Commit updates
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_stories.json data/briefs/*.md
          git diff --staged --quiet || git commit -m "Update news brief $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
